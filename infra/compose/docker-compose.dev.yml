name: local-ai-hub-dev

services:
  # ── Backing services (infrastructure only) ────────────────────────────────
  # Run the API and web frontend locally with:
  #   cd backend && python run.py
  #   cd frontend && npm run dev

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hub}
      POSTGRES_DB: ${POSTGRES_DB:-local_ai_hub}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hub} -d ${POSTGRES_DB:-local_ai_hub}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
